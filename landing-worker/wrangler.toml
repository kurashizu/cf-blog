name = "cf-landing"
main = ".open-next/worker.js"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Custom domains (apex + www.apex, e.g. `krsz.in` + `www.krsz.in`) are
# configured in the Cloudflare Dashboard — not declared here on purpose.
# Apex domain is centralized in `shared/site-config.ts` (APEX_DOMAIN).

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true