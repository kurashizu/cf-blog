name = "cf-landing"
main = ".open-next/worker.js"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Custom domains (022025.xyz, www.022025.xyz) are configured in the
# Cloudflare Dashboard — not declared here on purpose.

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true