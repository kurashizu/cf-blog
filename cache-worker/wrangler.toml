name = "cf-blog-cache"
main = "src/index.ts"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "cf-blog-db"
database_id = "f763e00a-1c8b-42d4-ad4f-65d0136cabd2"

[[vectorize]]
binding = "SEARCH_INDEX"
index_name = "blog-search"

[triggers]
# 30-min: cache refresh (repos, articles, leaderboard, contributions)
# 3-min: heartbeat (one news summary rewrite + one search-index tick)
# Daily 18:00 UTC (05:00 AEDT next day): HN top-30 fetch
crons = ["*/30 * * * *", "*/3 * * * *", "0 18 * * *"]

[vars]
CRON_SECRET = ""
GH_USERNAME = "kurashizu"
