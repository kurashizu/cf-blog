name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-cf-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Restore .open-next cache
        uses: actions/cache@v4
        with:
          path: .open-next
          key: opennext-${{ hashFiles('package-lock.json') }}-${{ hashFiles('open-next.config.ts') }}

      - name: Build
        run: |
          BUILD_DATE=$(date +'build-%y%m%d-%H%M')
          echo "NEXT_PUBLIC_BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          npm run build:cf

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-cf-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-agent
        with:
          path: agent-worker/node_modules
          key: agent-node-${{ hashFiles('agent-worker/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-agent.outputs.cache-hit != 'true'
        run: |
          cd agent-worker
          npm ci --legacy-peer-deps

      - name: Restore .open-next cache
        uses: actions/cache@v4
        with:
          path: agent-worker/.open-next
          key: opennext-agent-${{ hashFiles('agent-worker/package-lock.json') }}-${{ hashFiles('agent-worker/open-next.config.ts') }}

      - name: Build
        run: |
          cd agent-worker
          npm run build:cf

      - name: Deploy
        run: |
          cd agent-worker
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-cache-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-cache
        with:
          path: cache-worker/node_modules
          key: cache-node-${{ hashFiles('cache-worker/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-cache.outputs.cache-hit != 'true'
        run: |
          cd cache-worker
          npm ci --legacy-peer-deps

      - name: Deploy
        run: |
          cd cache-worker
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
