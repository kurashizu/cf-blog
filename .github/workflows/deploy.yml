name: Deploy

on:
    push:
        branches:
            - main

# Cancel any in-progress deploys when a new commit is pushed to the same ref.
concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-cf-blog:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Cache node_modules
              uses: actions/cache@v5
              id: cache-blog
              with:
                  path: node_modules
                  key: blog-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      blog-node-

            - name: Install dependencies
              if: steps.cache-blog.outputs.cache-hit != 'true'
              run: npm ci --legacy-peer-deps

            - name: Test
              run: npm test

            - name: Build
              run: |
                  BUILD_DATE=$(date +'build-%y%m%d-%H%M')
                  echo "NEXT_PUBLIC_BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
                  npm run build:cf

            - name: Deploy
              run: npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-cf-agent:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Cache node_modules
              uses: actions/cache@v5
              id: cache-agent
              with:
                  path: agent-worker/node_modules
                  key: agent-node-${{ hashFiles('agent-worker/package-lock.json') }}
                  restore-keys: |
                      agent-node-

            - name: Install dependencies
              if: steps.cache-agent.outputs.cache-hit != 'true'
              run: |
                  cd agent-worker
                  npm ci --legacy-peer-deps

            - name: Build
              run: |
                  cd agent-worker
                  npm run build:cf

            - name: Deploy
              run: |
                  cd agent-worker
                  npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

deploy-cache-worker:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Cache node_modules
              uses: actions/cache@v5
              id: cache-cache
              with:
                  path: cache-worker/node_modules
                  key: cache-node-${{ hashFiles('cache-worker/package-lock.json') }}
                  restore-keys: |
                  cache-node-

            - name: Install dependencies
              if: steps.cache-cache.outputs.cache-hit != 'true'
              run: |
                  cd cache-worker
                  npm ci --legacy-peer-deps

            - name: Deploy
              run: |
                  cd cache-worker
                  npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-landing:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Cache node_modules
              uses: actions/cache@v5
              id: cache-landing
              with:
                  path: landing-worker/node_modules
                  key: landing-node-${{ hashFiles('landing-worker/package-lock.json') }}
                  restore-keys: |
                  landing-node-

            - name: Install dependencies
              if: steps.cache-landing.outputs.cache-hit != 'true'
              run: |
                  cd landing-worker
                  npm ci --legacy-peer-deps

            - name: Build
              run: |
                  cd landing-worker
                  npm run build:cf

            - name: Deploy
              run: |
                  cd landing-worker
                  npx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    update-db:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Apply D1 schema migration
              run: npx wrangler d1 execute cf-blog-db --remote --file=database/schema.sql
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
