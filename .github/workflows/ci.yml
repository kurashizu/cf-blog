name: CI

on:
    pull_request:
        branches:
            - main

# Cancel any in-progress CI runs when a new commit is pushed to the same PR.
concurrency:
    group: ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    cf-blog-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - uses: actions/cache@v5
              with:
                  path: node_modules
                  key: blog-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      blog-node-

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Typecheck
              run: npx tsc --noEmit

            - name: Lint
              run: npm run lint

            - name: Unit tests
              run: npm test

            - name: Build
              run: npm run build:cf

    cf-agent-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - uses: actions/cache@v5
              with:
                  path: agent-worker/node_modules
                  key: agent-node-${{ hashFiles('agent-worker/package-lock.json') }}
                  restore-keys: |
                      agent-node-

            - name: Install dependencies
              working-directory: agent-worker
              run: npm ci --legacy-peer-deps

            - name: Typecheck
              working-directory: agent-worker
              run: npx tsc --noEmit

            - name: Unit tests
              working-directory: agent-worker
              run: npm test

            - name: Build
              working-directory: agent-worker
              run: npm run build:cf
